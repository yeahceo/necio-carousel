<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>넥씨오 3기 커피챗</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ticker-outer {
      width: 100%;
      overflow-x: hidden;
      padding: 12px 0;
    }

    .ticker-track {
      display: flex;
      gap: 14px;
      width: max-content;
      will-change: transform;
    }

    .ticker-track img {
      height: 88vh;
      max-height: 460px;
      width: auto;
      border-radius: 10px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .ticker-track img:active { transform: scale(1.05); }

    .btn-group {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 10px;
      z-index: 100;
    }

    .control-btn {
      width: 50px;
      height: 50px;
      background: rgba(0,0,0,0.08);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: background 0.2s;
      filter: grayscale(100%) brightness(0.5);
    }

    .control-btn:hover { background: rgba(0,0,0,0.12); }
    .control-btn.active { background: rgba(0,0,0,0.18); }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 200;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s;
    }

    .lightbox.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .lightbox img {
      max-width: 95%;
      max-height: 95%;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 40px; height: 40px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lightbox-close:hover { background: rgba(255,255,255,0.4); }

    @media (max-width: 600px) {
      .ticker-track img { max-height: 300px; }
      .ticker-track { gap: 10px; }
      .btn-group { bottom: 16px; right: 16px; gap: 8px; }
      .control-btn { width: 40px; height: 40px; font-size: 16px; }
      .lightbox-close { width: 36px; height: 36px; font-size: 20px; }
    }
  </style>
</head>
<body>

<div class="ticker-outer">
  <div class="ticker-track" id="track"></div>
</div>

<div class="btn-group">
  <button class="control-btn" id="fastBtn" title="빠르게">⏩</button>
  <button class="control-btn" id="toggleBtn" title="재생/멈춤">⏸️</button>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  const folder = "images/" + encodeURIComponent("커피챗");
  const files = [
    "KakaoTalk_20260625_134100354.jpg",
    "KakaoTalk_20260625_134338841.jpg",
    "KakaoTalk_20260625_134402177.jpg",
    "KakaoTalk_20260625_134417834.jpg",
    "KakaoTalk_20260625_135828034.jpg",
    "KakaoTalk_20260625_140300544.jpg",
    "KakaoTalk_20260625_140405256.jpg",
    "KakaoTalk_20260625_145445030.jpg",
    "KakaoTalk_20260625_145602753.jpg",
    "KakaoTalk_20260625_145632665.jpg",
    "KakaoTalk_20260625_150718222.jpg",
    "KakaoTalk_20260625_150724834.jpg",
    "KakaoTalk_20260625_150805318.jpg",
    "KakaoTalk_20260625_150814990.jpg",
  ];

  const track = document.getElementById("track");
  const toggleBtn = document.getElementById("toggleBtn");
  const fastBtn = document.getElementById("fastBtn");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const lightboxClose = document.getElementById("lightboxClose");

  const BASE_SPEED = 2.2;   // 기본 px/frame
  const FAST_SPEED = 9;     // 빠른 모드 px/frame
  const MIN_FACTOR = 0.15;  // 가운데 정중앙일 때 최소 속도 비율
  const SLOW_RADIUS = 180;  // 이 반경(px) 안에 들어오면 감속 시작

  let offset = 0;
  let halfWidth = 0;
  let isPlaying = true;
  let isFast = false;
  let isLightboxOpen = false;

  [files, files].forEach(set => {
    set.forEach(name => {
      const img = document.createElement("img");
      img.src = `${folder}/${name}`;
      img.alt = "";
      img.loading = "eager";
      img.addEventListener("click", () => openLightbox(img.src));
      track.appendChild(img);
    });
  });

  // 이미지 로드 후 halfWidth 측정
  window.addEventListener("load", () => {
    halfWidth = track.scrollWidth / 2;
    requestAnimationFrame(animate);
  });

  function getSpeedFactor() {
    const viewCenter = window.innerWidth / 2;
    let minDist = Infinity;

    track.querySelectorAll("img").forEach(img => {
      const rect = img.getBoundingClientRect();
      const imgCenter = rect.left + rect.width / 2;
      const dist = Math.abs(imgCenter - viewCenter);
      if (dist < minDist) minDist = dist;
    });

    // smoothstep: 가운데 가까울수록 느리게
    const t = Math.min(minDist / SLOW_RADIUS, 1);
    const smooth = t * t * (3 - 2 * t);
    return MIN_FACTOR + (1 - MIN_FACTOR) * smooth;
  }

  function animate() {
    if (isPlaying && !isLightboxOpen && halfWidth > 0) {
      const speed = isFast ? FAST_SPEED : BASE_SPEED * getSpeedFactor();
      offset += speed;
      if (offset >= halfWidth) offset -= halfWidth;
      track.style.transform = `translateX(${-offset}px)`;
    }
    requestAnimationFrame(animate);
  }

  function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add("active");
    isLightboxOpen = true;
  }

  function closeLightbox() {
    lightbox.classList.remove("active");
    isLightboxOpen = false;
  }

  lightboxClose.addEventListener("click", closeLightbox);
  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  toggleBtn.addEventListener("click", () => {
    isPlaying = !isPlaying;
    toggleBtn.textContent = isPlaying ? "⏸️" : "▶️";
  });

  fastBtn.addEventListener("click", () => {
    isFast = !isFast;
    fastBtn.classList.toggle("active", isFast);
  });
</script>

</body>
</html>
